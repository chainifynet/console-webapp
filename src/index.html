<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chainify Console</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <script async src="/libs/wallet-address-validator.min.js"></script>
        
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-3JSHVJB15X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-3JSHVJB15X');
    </script>

    <script>
      (function () {
        function getInitialColorMode() {
          const persistedColorPreference = window.localStorage.getItem('color-mode');
          const hasPersistedPreference = typeof persistedColorPreference === 'string';
          // If the user has explicitly chosen light or dark,
          // let's use it. Otherwise, this value will be null.
          if (hasPersistedPreference) {
            return persistedColorPreference;
          }
          // If they haven't been explicit, let's check the media
          // query
          const mql = window.matchMedia('(prefers-color-scheme: dark)');
          const hasMediaQueryPreference = typeof mql.matches === 'boolean';
          if (hasMediaQueryPreference) {
            return mql.matches ? 'dark' : 'light';
          }
          // If they are using a browser/OS that doesn't support
          // color themes, let's default to 'light'.
          return 'light';
        }

        const theme = getInitialColorMode();
        const htmlEl = document.documentElement;

        htmlEl.setAttribute('data-theme', theme);
        if (theme === 'dark') {
          htmlEl.style.backgroundColor = "#2b303b";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
